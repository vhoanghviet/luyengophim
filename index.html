<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdTech TypeRacer - Bản Cập Nhật UX</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --primary: #38bdf8;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #eab308;
            --font-code: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .config-section {
            margin-bottom: 1.5rem;
            background: rgba(15, 23, 42, 0.6);
            padding: 1rem;
            border-radius: 8px;
        }

        .config-section label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .config-section textarea {
            width: 100%;
            height: 60px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: var(--text-main);
            padding: 0.5rem;
            resize: none;
        }

        /* RACETRACK */
        .racetrack {
            background: #0f172a;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
        }

        .lane { margin-bottom: 1rem; }
        .lane:last-child { margin-bottom: 0; }
        .lane-info { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.3rem; }
        .bot-name { color: var(--warning); }
        .player-name { color: var(--primary); font-weight: bold; }
        .progress-bar-bg { width: 100%; height: 12px; background: #334155; border-radius: 6px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; transition: width 0.2s ease-out; }
        .lane-player .progress-bar-fill { background: linear-gradient(90deg, #0284c7, var(--primary)); }
        .lane-bot1 .progress-bar-fill { background: linear-gradient(90deg, #b45309, var(--warning)); }
        .lane-bot2 .progress-bar-fill { background: linear-gradient(90deg, #be123c, var(--error)); }

        /* VÙNG ĐOẠN VĂN MẪU CÓ GIỚI HẠN CHIỀU CAO & AUTO SCROLL */
        .text-display {
            background: #0f172a;
            padding: 1.5rem;
            border-radius: 12px;
            font-size: 1.3rem;
            line-height: 1.8;
            font-family: var(--font-code);
            margin-bottom: 1rem;
            border: 2px solid #334155;
            word-wrap: break-word;
            user-select: none;
            max-height: 160px; /* Giới hạn chiều cao cố định */
            overflow-y: auto;  /* Tự động xuất hiện cuộn dọc nếu đoạn văn quá dài */
            scroll-behavior: smooth;
        }

        .char-correct {
            color: var(--success);
            background-color: rgba(34, 197, 94, 0.1);
        }

        .char-incorrect {
            color: #ffffff;
            background-color: rgba(239, 68, 68, 0.8); /* Hiện rõ chữ lỗi màu đỏ nền sáng */
        }

        .char-current {
            background-color: rgba(56, 189, 248, 0.3);
            border-bottom: 2px solid var(--primary);
        }

        /* Ô NHẬP LIỆU */
        .input-panel {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .type-input {
            flex: 1;
            padding: 1rem;
            font-size: 1.2rem;
            border-radius: 8px;
            border: 2px solid #334155;
            background: #0f172a;
            color: var(--text-main);
            outline: none;
        }

        .type-input.input-error {
            border-color: var(--error);
            background: rgba(239, 68, 68, 0.05);
            color: var(--error); /* Chữ đang gõ sai dưới ô input cũng đổi màu */
        }

        .stats { display: flex; gap: 1rem; font-weight: bold; min-width: 220px; }
        .stat-box { background: #334155; padding: 0.5rem; border-radius: 8px; flex: 1; text-align: center; }
        .stat-box span { display: block; font-size: 0.75rem; color: var(--text-muted); }

        .control-panel { display: flex; justify-content: space-between; align-items: center; }
        .btn { background: var(--primary); color: #0f172a; padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: var(--text-muted); cursor: not-allowed; }
        .countdown { font-size: 1.5rem; font-weight: bold; color: var(--warning); }

        .leaderboard { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #334155; display: none; }
        .leaderboard h3 { color: var(--success); margin-bottom: 0.5rem; }
        ol { padding-left: 1.5rem; }
        li { margin-bottom: 0.25rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>EdTech TypeRacer</h1>

        <div class="config-section" id="configSection">
            <label for="customText">Nhập hoặc dán đoạn văn bản dài tùy thích vào đây:</label>
            <textarea id="customText">Học lập trình không phải là học thuộc lòng các cú pháp câu lệnh. Bản chất của nó là rèn luyện tư duy logic, khả năng giải quyết vấn đề và cách tổ chức hệ thống cấu trúc dữ liệu một cách tối ưu nhất. Khi bạn đối mặt với một đoạn văn bản dài hoặc một thuật toán phức tạp, hãy chia nhỏ nó ra thành từng phần để xử lý như cách chúng ta xây dựng từng khối module trong công nghệ phần mềm hiện đại vậy.</textarea>
        </div>
        
        <div class="racetrack">
            <div class="lane lane-player">
                <div class="lane-info"><span class="player-name">Bạn (Người chơi)</span><span id="playerProgressText">0%</span></div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" id="playerProgress"></div></div>
            </div>
            <div class="lane lane-bot1">
                <div class="lane-info"><span class="bot-name">🤖 Bot Cần Mẫn (Trung bình)</span><span id="bot1ProgressText">0%</span></div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" id="bot1Progress"></div></div>
            </div>
            <div class="lane lane-bot2">
                <div class="lane-info"><span class="bot-name">⚡ Bot Siêu Tốc (Khó)</span><span id="bot2ProgressText">0%</span></div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" id="bot2Progress"></div></div>
            </div>
        </div>

        <div class="text-display" id="textDisplay"></div>

        <div class="input-panel">
            <input type="text" class="type-input" id="typeInput" placeholder="Bấm nút bắt đầu để mở khóa đua..." disabled autocomplete="off">
            <div class="stats">
                <div class="stat-box"><span>WPM</span><div id="wpmDisplay">0</div></div>
                <div class="stat-box"><span>Thời gian</span><div id="timeDisplay">0s</div></div>
            </div>
        </div>
        
        <div class="control-panel">
            <button class="btn" id="startBtn">Bắt đầu đua</button>
            <div class="countdown" id="countdownDisplay"></div>
        </div>

        <div class="leaderboard" id="leaderboard">
            <h3>Kết Quả Chung Cuộc</h3>
            <ol id="rankList"></ol>
        </div>
    </div>

    <script>
        let targetText = "";
        let timerInterval = null;
        let botInterval = null;
        let startTime = null;
        let isPlaying = false;

        // Lưu vị trí chỉ số (index) ký tự ĐÚNG liên tục cuối cùng
        let lastCorrectIndex = 0; 

        let bots = [
            { id: 1, name: "🤖 Bot Cần Mẫn", baseWpm: 40, progress: 0, finished: false, element: document.getElementById('bot1Progress'), textElement: document.getElementById('bot1ProgressText') },
            { id: 2, name: "⚡ Bot Siêu Tốc", baseWpm: 70, progress: 0, finished: false, element: document.getElementById('bot2Progress'), textElement: document.getElementById('bot2ProgressText') }
        ];

        let ranks = [];

        const customText = document.getElementById('customText');
        const textDisplay = document.getElementById('textDisplay');
        const typeInput = document.getElementById('typeInput');
        const startBtn = document.getElementById('startBtn');
        const countdownDisplay = document.getElementById('countdownDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const wpmDisplay = document.getElementById('wpmDisplay');
        const playerProgress = document.getElementById('playerProgress');
        const playerProgressText = document.getElementById('playerProgressText');
        const leaderboard = document.getElementById('leaderboard');
        const rankList = document.getElementById('rankList');

        startBtn.addEventListener('click', initCountdown);
        typeInput.addEventListener('input', handleTypingUXUpdate);

        // Render cấu trúc chữ ban đầu
        renderTextHTML("", 0);

        // Tạo thẻ span cho từng ký tự để đổi màu linh hoạt
        function renderTextHTML(inputValue, currentCorrectLen) {
            targetText = customText.value.trim();
            textDisplay.innerHTML = "";
            
            let activeSpan = null;

            for (let i = 0; i < targetText.length; i++) {
                const span = document.createElement('span');
                span.innerText = targetText[i];
                
                if (i < inputValue.length) {
                    // Nếu nằm trong phạm vi người dùng đã gõ
                    if (i < currentCorrectLen) {
                        span.classList.add('char-correct'); // Đoạn gõ đúng màu xanh
                    } else {
                        span.classList.add('char-incorrect'); // Đoạn gõ sai hiển thị nền Đỏ rõ ràng
                    }
                } else if (i === inputValue.length && isPlaying) {
                    span.classList.add('char-current'); // Con trỏ ký tự hiện tại
                    activeSpan = span;
                }
                textDisplay.appendChild(span);
            }

            // [SỬA LỖI 1]: Tự động cuộn phần hiển thị để ký tự hiện tại luôn nằm trong khung nhìn
            if (activeSpan) {
                activeSpan.scrollIntoView({
                    behavior: 'smooth',
                    block: 'nearest'
                });
            }
        }

        function initCountdown() {
            if (isPlaying) return;
            
            targetText = customText.value.trim();
            if(!targetText) return alert("Vui lòng nhập văn bản!");

            customText.disabled = true;
            startBtn.disabled = true;
            typeInput.value = "";
            lastCorrectIndex = 0;
            timeDisplay.innerText = "0s";
            wpmDisplay.innerText = "0";
            playerProgress.style.width = "0%";
            playerProgressText.innerText = "0%";
            leaderboard.style.display = "none";
            
            bots.forEach(bot => {
                bot.progress = 0;
                bot.finished = false;
                bot.element.style.width = "0%";
                bot.textElement.innerText = "0%";
            });
            ranks = [];
            renderTextHTML("", 0);

            let count = 3;
            countdownDisplay.innerText = `Sẵn sàng: ${count}`;
            
            let countdownInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownDisplay.innerText = `Sẵn sàng: ${count}`;
                } else {
                    clearInterval(countdownInterval);
                    countdownDisplay.innerText = "ĐUA !!!";
                    startGame();
                }
            }, 1000);
        }

        function startGame() {
            isPlaying = true;
            startTime = new Date();
            typeInput.disabled = false;
            typeInput.placeholder = "Gõ đoạn văn trên tại đây...";
            typeInput.focus();
            renderTextHTML("", 0);

            timerInterval = setInterval(() => {
                let elapsed = Math.floor((new Date() - startTime) / 1000);
                timeDisplay.innerText = `${elapsed}s`;
                if (elapsed > 0) {
                    let words = lastCorrectIndex / 5;
                    wpmDisplay.innerText = Math.round(words / (elapsed / 60));
                }
            }, 1000);

            startBotSimulation();
        }

        // [SỬA LỖI 2]: LOGIC SO KHỚP CHỮ KIỂU TYPERACER THỰC TẾ
        function handleTypingUXUpdate() {
            if (!isPlaying) return;

            let inputValue = typeInput.value;
            
            // Tìm độ dài chuỗi khớp đúng liên tục tính từ ký tự đầu tiên
            let currentCorrectLen = 0;
            while (currentCorrectLen < inputValue.length && 
                   currentCorrectLen < targetText.length && 
                   inputValue[currentCorrectLen] === targetText[currentCorrectLen]) {
                currentCorrectLen++;
            }

            lastCorrectIndex = currentCorrectLen;

            // Kiểm tra trạng thái lỗi để cập nhật khung Input
            if (currentCorrectLen < inputValue.length) {
                // Nếu độ dài gõ đúng nhỏ hơn độ dài đang nhập -> Đang có ký tự SAI hiện diện
                typeInput.classList.add('input-error');
            } else {
                typeInput.classList.remove('input-error');
            }

            // Cập nhật tiến trình của người chơi dựa trên số ký tự ĐÚNG
            let progressPercent = Math.floor((currentCorrectLen / targetText.length) * 100);
            playerProgress.style.width = `${progressPercent}%`;
            playerProgressText.innerText = `${progressPercent}%`;

            // Render lại màu chữ trên màn hình (vừa cập nhật màu đỏ lỗi, vừa kích hoạt cuộn)
            renderTextHTML(inputValue, currentCorrectLen);

            // Kiểm tra xem đã hoàn thành toàn bộ bài chưa
            if (currentCorrectLen === targetText.length) {
                finishRace("Bạn (Người chơi)");
            }
        }

        // THUẬT TOÁN ĐIỀU KHIỂN BOT DYNAMIC
        function startBotSimulation() {
            botInterval = setInterval(() => {
                let totalChars = targetText.length;
                let allBotsFinished = true;

                bots.forEach(bot => {
                    if (bot.finished) return;
                    allBotsFinished = false;

                    let variance = Math.floor(Math.random() * 20) - 10; 
                    let currentWpm = bot.baseWpm + variance;
                    let charsPerSecond = (Math.max(currentWpm, 10) * 5) / 60;
                    
                    let currentBotChars = (bot.progress / 100) * totalChars + charsPerSecond;
                    let progressPercent = Math.min(Math.floor((currentBotChars / totalChars) * 100), 100);
                    
                    bot.progress = progressPercent;
                    bot.element.style.width = `${progressPercent}%`;
                    bot.textElement.innerText = `${progressPercent}%`;

                    if (bot.progress >= 100) {
                        bot.finished = true;
                        finishRace(bot.name);
                    }
                });

                if (allBotsFinished) clearInterval(botInterval);
            }, 1000);
        }

        function finishRace(runnerName) {
            if (!ranks.includes(runnerName)) ranks.push(runnerName);

            if (runnerName === "Bạn (Người chơi)") {
                isPlaying = false;
                clearInterval(timerInterval);
                clearInterval(botInterval);
                typeInput.disabled = true;
                customText.disabled = false;
                startBtn.disabled = false;
                countdownDisplay.innerText = "HẾT GIỜ ĐUA!";
                
                bots.forEach(bot => {
                    if (!bot.finished) {
                        ranks.push(bot.name);
                        bot.finished = true;
                        bot.element.style.width = "100%";
                        bot.textElement.innerText = "100%";
                    }
                });
                showLeaderboard();
            }
        }

        function showLeaderboard() {
            leaderboard.style.display = "block";
            rankList.innerHTML = "";
            ranks.forEach((name, index) => {
                const li = document.createElement('li');
                li.innerHTML = `Hạng ${index + 1}: <strong>${name}</strong>`;
                if(name === "Bạn (Người chơi)") li.style.color = "var(--primary)";
                rankList.appendChild(li);
            });
