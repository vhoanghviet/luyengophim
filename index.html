<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TỐC ĐỘ // Đua Gõ Chữ</title>
<style>
  /* ============ TOKENS ============ */
  :root{
    --track-night:#0c0f14;
    --track-night-2:#12161d;
    --asphalt:#1a1f29;
    --lane-line:#2a313f;
    --chalk:#e8eaef;
    --chalk-dim:#7b8494;
    --speed-amber:#ffb02e;
    --speed-amber-dim:#7a5a1f;
    --go-green:#3ddc84;
    --stop-red:#ff4d5e;
    --player-blue:#4ea1ff;

    --font-display:'Oswald', 'Arial Narrow', sans-serif;
    --font-mono:'JetBrains Mono','Courier New',monospace;
    --font-body:'Inter',-apple-system,sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    background:
      radial-gradient(ellipse at top, var(--track-night-2), var(--track-night) 70%);
    color:var(--chalk);
    font-family:var(--font-body);
    min-height:100vh;
    padding:32px 16px 64px;
    background-attachment:fixed;
  }

  /* subtle asphalt grain via repeating gradient */
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:repeating-linear-gradient(
      0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px,
      transparent 1px, transparent 3px
    );
    pointer-events:none;
    z-index:0;
  }

  .container{
    max-width:920px;
    margin:0 auto;
    position:relative;
    z-index:1;
  }

  /* ============ HEADER ============ */
  header{
    text-align:center;
    margin-bottom:28px;
  }
  header .eyebrow{
    font-family:var(--font-mono);
    letter-spacing:.35em;
    font-size:11px;
    color:var(--speed-amber);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  header h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:clamp(32px,6vw,52px);
    letter-spacing:.02em;
    text-transform:uppercase;
    margin:0;
    color:var(--chalk);
    text-shadow:0 0 24px rgba(255,176,46,0.18);
  }
  header h1 span{ color:var(--speed-amber); }
  header p.sub{
    color:var(--chalk-dim);
    font-size:14px;
    margin-top:8px;
  }

  /* ============ PANELS ============ */
  .panel{
    background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border:1px solid rgba(255,255,255,0.07);
    border-radius:10px;
    padding:22px;
    margin-bottom:20px;
  }

  /* ============ INPUT SECTION ============ */
  .input-section label{
    display:block;
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--chalk-dim);
    margin-bottom:8px;
  }
  textarea#customText{
    width:100%;
    min-height:90px;
    resize:vertical;
    background:var(--track-night);
    border:1px solid var(--lane-line);
    border-radius:8px;
    color:var(--chalk);
    font-family:var(--font-mono);
    font-size:14px;
    line-height:1.6;
    padding:12px 14px;
    outline:none;
    transition:border-color .15s ease;
  }
  textarea#customText:focus{
    border-color:var(--speed-amber);
  }

  .controls-row{
    display:flex;
    gap:14px;
    margin-top:14px;
    flex-wrap:wrap;
    align-items:center;
  }

  select#difficulty{
    background:var(--track-night);
    border:1px solid var(--lane-line);
    color:var(--chalk);
    font-family:var(--font-mono);
    font-size:13px;
    padding:10px 12px;
    border-radius:8px;
    outline:none;
    cursor:pointer;
  }

  .btn{
    font-family:var(--font-display);
    font-weight:600;
    letter-spacing:.06em;
    text-transform:uppercase;
    font-size:14px;
    padding:11px 26px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
  }
  .btn:active{ transform:scale(0.97); }
  .btn-primary{
    background:var(--speed-amber);
    color:#1a1306;
    box-shadow:0 0 0 rgba(255,176,46,0);
  }
  .btn-primary:hover{
    box-shadow:0 4px 18px rgba(255,176,46,0.35);
  }
  .btn-primary:disabled{
    opacity:.4;
    cursor:not-allowed;
    box-shadow:none;
  }
  .btn-ghost{
    background:transparent;
    color:var(--chalk-dim);
    border:1px solid var(--lane-line);
  }
  .btn-ghost:hover{
    color:var(--chalk);
    border-color:var(--chalk-dim);
  }

  /* ============ RACE TRACK ============ */
  .race-track{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .racer-row{
    display:grid;
    grid-template-columns:120px 1fr 56px;
    align-items:center;
    gap:12px;
  }
  .racer-row .racer-name{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--chalk-dim);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .racer-row.is-player .racer-name{ color:var(--player-blue); font-weight:600; }
  .racer-dot{
    width:8px; height:8px; border-radius:50%;
    flex-shrink:0;
  }

  .lane{
    position:relative;
    height:26px;
    background:repeating-linear-gradient(
      90deg, var(--asphalt) 0 18px, var(--track-night-2) 18px 20px
    );
    border-radius:5px;
    overflow:hidden;
    border:1px solid var(--lane-line);
  }
  .lane::after{
    /* finish line marker */
    content:"";
    position:absolute;
    right:0; top:0; bottom:0;
    width:4px;
    background:repeating-linear-gradient(45deg, var(--chalk) 0 4px, transparent 4px 8px);
    opacity:.5;
  }
  .progress-fill{
    height:100%;
    width:0%;
    border-radius:4px 0 0 4px;
    transition:width .12s linear;
    position:relative;
  }
  .racer-row.is-player .progress-fill{ background:linear-gradient(90deg, var(--player-blue), #7ec4ff); }
  .racer-row.is-bot .progress-fill{ background:linear-gradient(90deg, var(--speed-amber-dim), var(--speed-amber)); }
  .progress-fill.finished{ background:linear-gradient(90deg, #1f9d57, var(--go-green)) !important; }

  .racer-row .pct{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--chalk-dim);
    text-align:right;
  }

  /* ============ STATS ============ */
  .stats-panel{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px;
    text-align:center;
  }
  .stat-box .stat-label{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--chalk-dim);
    margin-bottom:4px;
  }
  .stat-box .stat-value{
    font-family:var(--font-display);
    font-size:28px;
    font-weight:600;
    color:var(--speed-amber);
  }
  .stat-box .stat-value.accent-green{ color:var(--go-green); }
  .stat-box .stat-value.accent-red{ color:var(--stop-red); }

  /* ============ TEXT DISPLAY ============ */
  .text-display{
    font-family:var(--font-mono);
    font-size:19px;
    line-height:1.9;
    letter-spacing:.01em;
    padding:20px 22px;
    background:var(--track-night);
    border:1px solid var(--lane-line);
    border-radius:8px;
    user-select:none;
    word-wrap:break-word;
  }
  .text-display.locked-error{
    animation:shakeField .18s ease;
  }
  @keyframes shakeField{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-4px); }
    75%{ transform:translateX(4px); }
  }

  .char{ position:relative; }
  .char.untyped{ color:var(--chalk-dim); }
  .char.correct{ color:var(--go-green); }
  .char.incorrect{
    color:var(--stop-red);
    background:rgba(255,77,94,0.16);
    border-radius:2px;
  }
  .char.current{
    background:var(--speed-amber);
    color:#1a1306;
    border-radius:2px;
    animation:blinkCursor 1s step-start infinite;
  }
  @keyframes blinkCursor{
    50%{ background:rgba(255,176,46,0.45); color:var(--chalk); }
  }

  #hiddenInput{
    position:absolute;
    opacity:0;
    height:1px; width:1px;
    pointer-events:none;
  }

  .hint-row{
    margin-top:10px;
    font-size:12px;
    color:var(--chalk-dim);
    font-family:var(--font-mono);
    text-align:center;
  }

  /* ============ RESULT MODAL ============ */
  .result-modal{
    position:fixed;
    inset:0;
    background:rgba(8,10,14,0.78);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:20px;
  }
  .result-modal.show{ display:flex; }
  .result-card{
    background:var(--track-night-2);
    border:1px solid var(--lane-line);
    border-radius:14px;
    padding:32px;
    max-width:420px;
    width:100%;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .result-card .result-eyebrow{
    font-family:var(--font-mono);
    font-size:12px;
    letter-spacing:.2em;
    color:var(--speed-amber);
    text-transform:uppercase;
  }
  .result-card h2{
    font-family:var(--font-display);
    font-size:34px;
    text-transform:uppercase;
    margin:6px 0 18px;
  }
  .leaderboard{
    list-style:none;
    padding:0; margin:0 0 22px;
    text-align:left;
  }
  .leaderboard li{
    display:flex;
    justify-content:space-between;
    padding:9px 4px;
    border-bottom:1px solid rgba(255,255,255,0.06);
    font-family:var(--font-mono);
    font-size:14px;
  }
  .leaderboard li:last-child{ border-bottom:none; }
  .leaderboard .rank{ color:var(--speed-amber); margin-right:8px; }
  .leaderboard li.you{ color:var(--player-blue); font-weight:600; }

  /* ============ RESPONSIVE ============ */
  @media (max-width:600px){
    .racer-row{ grid-template-columns:78px 1fr 42px; gap:8px; }
    .stats-panel{ grid-template-columns:repeat(2,1fr); gap:18px; }
    .text-display{ font-size:16px; padding:16px; }
    header h1{ font-size:30px; }
  }

  /* focus visibility for accessibility */
  textarea:focus-visible, select:focus-visible, button:focus-visible{
    outline:2px solid var(--speed-amber);
    outline-offset:2px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="eyebrow">LUYỆN GÕ TỐC ĐỘ</div>
    <h1>TỐC ĐỘ <span>//</span> ĐUA GÕ CHỮ</h1>
    <p class="sub">Dán đoạn văn của bạn, chọn độ khó, và xem bạn có vượt được các đối thủ bot không.</p>
  </header>

  <!-- INPUT SECTION -->
  <section class="panel input-section" id="inputSection">
    <label for="customText">Dán văn bản luyện gõ vào đây</label>
    <textarea id="customText" placeholder="Dán hoặc nhập đoạn văn bạn muốn luyện gõ...">Học gõ chữ nhanh không chỉ giúp bạn làm việc hiệu quả hơn mà còn rèn luyện sự tập trung và phản xạ của ngón tay. Hãy thử thách bản thân với đoạn văn này để xem tốc độ của bạn nhanh đến đâu.</textarea>
    <div class="controls-row">
      <select id="difficulty">
        <option value="easy">Độ khó: Dễ (Bot 20-40 WPM)</option>
        <option value="medium" selected>Độ khó: Vừa (Bot 35-65 WPM)</option>
        <option value="hard">Độ khó: Khó (Bot 55-95 WPM)</option>
      </select>
      <button class="btn btn-primary" id="startBtn">Bắt Đầu Đua</button>
    </div>
  </section>

  <!-- RACE TRACK -->
  <section class="panel" id="raceTrackPanel" style="display:none;">
    <div class="race-track" id="raceTrack"></div>
  </section>

  <!-- STATS -->
  <section class="panel stats-panel" id="statsPanel" style="display:none;">
    <div class="stat-box">
      <div class="stat-label">WPM</div>
      <div class="stat-value" id="statWpm">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Thời gian</div>
      <div class="stat-value accent-green" id="statTime">0.0s</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Độ chính xác</div>
      <div class="stat-value" id="statAccuracy">100%</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Lỗi</div>
      <div class="stat-value accent-red" id="statErrors">0</div>
    </div>
  </section>

  <!-- TEXT DISPLAY -->
  <section class="panel" id="textPanel" style="display:none;">
    <div class="text-display" id="textDisplay"></div>
    <div class="hint-row">Gõ ký tự sai sẽ bị khóa — nhấn <strong>Backspace</strong> để sửa rồi tiếp tục.</div>
    <input id="hiddenInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </section>

  <div style="text-align:center;">
    <button class="btn btn-ghost" id="resetBtn" style="display:none;">Đua Lại Từ Đầu</button>
  </div>

</div>

<!-- RESULT MODAL -->
<div class="result-modal" id="resultModal">
  <div class="result-card">
    <div class="result-eyebrow">KẾT QUẢ ĐUA</div>
    <h2 id="resultTitle">VỀ ĐÍCH!</h2>
    <ul class="leaderboard" id="leaderboard"></ul>
    <button class="btn btn-primary" id="modalRestartBtn" style="width:100%;">Đua Lại</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ============ DOM REFERENCES ============ */
  const customText      = document.getElementById('customText');
  const difficultySel    = document.getElementById('difficulty');
  const startBtn         = document.getElementById('startBtn');
  const resetBtn         = document.getElementById('resetBtn');
  const inputSection      = document.getElementById('inputSection');
  const raceTrackPanel    = document.getElementById('raceTrackPanel');
  const raceTrackEl       = document.getElementById('raceTrack');
  const statsPanel        = document.getElementById('statsPanel');
  const textPanel          = document.getElementById('textPanel');
  const textDisplay        = document.getElementById('textDisplay');
  const hiddenInput        = document.getElementById('hiddenInput');
  const statWpm            = document.getElementById('statWpm');
  const statTime           = document.getElementById('statTime');
  const statAccuracy       = document.getElementById('statAccuracy');
  const statErrors         = document.getElementById('statErrors');
  const resultModal        = document.getElementById('resultModal');
  const resultTitle        = document.getElementById('resultTitle');
  const leaderboardEl      = document.getElementById('leaderboard');
  const modalRestartBtn    = document.getElementById('modalRestartBtn');

  /* ============ DIFFICULTY RANGES (WPM) ============ */
  const DIFFICULTY_RANGES = {
    easy:   { min: 20, max: 40 },
    medium: { min: 35, max: 65 },
    hard:   { min: 55, max: 95 }
  };

  const BOT_NAMES = ['Bot Tia Chớp', 'Bot Rùa Thép', 'Bot Cuồng Phong'];
  const BOT_COUNT = 3;

  /* ============ STATE ============ */
  let raceText = "";
  let currentIndex = 0;
  let totalErrors = 0;          // tổng số lần gõ sai (để tính độ chính xác)
  let totalKeystrokes = 0;
  let startTime = null;
  let isRaceActive = false;
  let isFinished = false;
  let charSpans = [];

  let bots = [];                // {id,name,baseWpm,currentWpm,charIndex,accumulatedChars,finished,finishTime,el,fillEl,pctEl}
  let gameLoopId = null;
  let lastTickTime = null;
  let statsIntervalId = null;
  let wpmRebalanceTimer = 0;

  /* ============ UTILITIES ============ */
  function randomRange(min, max){
    return Math.random() * (max - min) + min;
  }

  function clamp(val, min, max){
    return Math.max(min, Math.min(max, val));
  }

  function escapeChar(ch){
    if(ch === ' ') return ' ';
    return ch;
  }

  /* ============ RENDER TEXT INTO SPANS ============ */
  function renderText(text){
    textDisplay.innerHTML = '';
    charSpans = [];
    for(let i=0;i<text.length;i++){
      const span = document.createElement('span');
      span.className = 'char untyped';
      span.textContent = escapeChar(text[i]);
      if(i === 0) span.classList.add('current');
      textDisplay.appendChild(span);
      charSpans.push(span);
    }
  }

  function updateCharVisual(){
    for(let i=0;i<charSpans.length;i++){
      const span = charSpans[i];
      span.classList.remove('correct','incorrect','current','untyped');
      if(i < currentIndex){
        span.classList.add('correct');
      } else if(i === currentIndex){
        span.classList.add('current');
      } else {
        span.classList.add('untyped');
      }
    }
  }

  /* ============ RACE TRACK / PROGRESS BARS ============ */
  function buildRaceTrack(){
    raceTrackEl.innerHTML = '';

    // Player row
    const playerRow = createRacerRow('player', 'Bạn', true);
    raceTrackEl.appendChild(playerRow.row);
    playerRacer = playerRow;

    // Bot rows
    bots = [];
    const range = DIFFICULTY_RANGES[difficultySel.value];
    for(let i=0;i<BOT_COUNT;i++){
      const baseWpm = randomRange(range.min, range.max);
      const rowData = createRacerRow('bot-'+i, BOT_NAMES[i] || ('Bot '+(i+1)), false);
      raceTrackEl.appendChild(rowData.row);
      bots.push({
        id:'bot-'+i,
        name: BOT_NAMES[i] || ('Bot '+(i+1)),
        baseWpm: baseWpm,
        currentWpm: baseWpm,
        charIndex: 0,
        accumulatedChars: 0,
        finished:false,
        finishTime:null,
        lagUntil:0,
        el: rowData.row,
        fillEl: rowData.fillEl,
        pctEl: rowData.pctEl
      });
    }
  }

  let playerRacer = null;

  function createRacerRow(id, name, isPlayer){
    const row = document.createElement('div');
    row.className = 'racer-row ' + (isPlayer ? 'is-player' : 'is-bot');
    row.dataset.id = id;

    const nameEl = document.createElement('div');
    nameEl.className = 'racer-name';
    const dot = document.createElement('span');
    dot.className = 'racer-dot';
    dot.style.background = isPlayer ? 'var(--player-blue)' : 'var(--speed-amber)';
    nameEl.appendChild(dot);
    const nameText = document.createElement('span');
    nameText.textContent = name;
    nameEl.appendChild(nameText);

    const lane = document.createElement('div');
    lane.className = 'lane';
    const fill = document.createElement('div');
    fill.className = 'progress-fill';
    lane.appendChild(fill);

    const pct = document.createElement('div');
    pct.className = 'pct';
    pct.textContent = '0%';

    row.appendChild(nameEl);
    row.appendChild(lane);
    row.appendChild(pct);

    return { row, fillEl: fill, pctEl: pct };
  }

  function updateRacerProgress(fillEl, pctEl, index, total, finished){
    const percent = Math.min(100, (index / total) * 100);
    fillEl.style.width = percent.toFixed(1) + '%';
    pctEl.textContent = Math.round(percent) + '%';
    if(finished){
      fillEl.classList.add('finished');
    }
  }

  /* ============ BOT WPM ALGORITHM (Nhiệm vụ 2) ============ */
  function rebalanceBotSpeeds(){
    bots.forEach(bot=>{
      if(bot.finished) return;

      // Dao động WPM quanh baseWpm, có biên độ +-30%
      const variance = bot.baseWpm * 0.3;
      let newWpm = bot.baseWpm + randomRange(-variance, variance);
      newWpm = clamp(newWpm, bot.baseWpm * 0.6, bot.baseWpm * 1.3);
      bot.currentWpm = newWpm;

      // 6% xác suất bot bị "khựng" lại (lag spike) mô phỏng ngẫm nghĩ / gõ sai
      if(Math.random() < 0.06){
        bot.lagUntil = performance.now() + randomRange(300, 800);
      }
    });
  }

  function updateBots(deltaMs, nowMs){
    bots.forEach(bot=>{
      if(bot.finished) return;

      // Nếu đang trong giai đoạn lag, không tăng tiến độ
      if(nowMs < bot.lagUntil){
        return;
      }

      const charsPerSecond = (bot.currentWpm * 5) / 60;
      const increment = charsPerSecond * (deltaMs / 1000);
      bot.accumulatedChars += increment;

      if(bot.accumulatedChars >= 1){
        const wholeChars = Math.floor(bot.accumulatedChars);
        bot.charIndex = Math.min(raceText.length, bot.charIndex + wholeChars);
        bot.accumulatedChars -= wholeChars;
      }

      updateRacerProgress(bot.fillEl, bot.pctEl, bot.charIndex, raceText.length, bot.charIndex >= raceText.length);

      if(bot.charIndex >= raceText.length && !bot.finished){
        bot.finished = true;
        bot.finishTime = (nowMs - startTime) / 1000;
      }
    });

    checkRaceEnd();
  }

  /* ============ GAME LOOP ============ */
  function gameLoop(timestamp){
    if(!isRaceActive) return;

    if(lastTickTime === null) lastTickTime = timestamp;
    const deltaMs = timestamp - lastTickTime;
    lastTickTime = timestamp;

    wpmRebalanceTimer += deltaMs;
    if(wpmRebalanceTimer >= 1200){
      rebalanceBotSpeeds();
      wpmRebalanceTimer = 0;
    }

    updateBots(deltaMs, timestamp);

    gameLoopId = requestAnimationFrame(gameLoop);
  }

  /* ============ PLAYER STATS ============ */
  function calculatePlayerWpm(){
    if(!startTime) return 0;
    const elapsedMinutes = (performance.now() - startTime) / 60000;
    if(elapsedMinutes <= 0) return 0;
    const wordsTyped = currentIndex / 5;
    return Math.round(wordsTyped / elapsedMinutes);
  }

  function calculateAccuracy(){
    if(totalKeystrokes === 0) return 100;
    const correctKeystrokes = totalKeystrokes - totalErrors;
    return Math.max(0, Math.round((correctKeystrokes / totalKeystrokes) * 100));
  }

  function updateStatsDisplay(){
    const elapsedSec = startTime ? (performance.now() - startTime) / 1000 : 0;
    statWpm.textContent = calculatePlayerWpm();
    statTime.textContent = elapsedSec.toFixed(1) + 's';
    statAccuracy.textContent = calculateAccuracy() + '%';
    statErrors.textContent = totalErrors;
  }

  /* ============ TYPING LOGIC (Nhiệm vụ 1) ============ */
  function handleKeyDown(e){
    if(!isRaceActive || isFinished) return;

    // Backspace: xoá lùi để sửa lỗi
    if(e.key === 'Backspace'){
      e.preventDefault();
      if(currentIndex > 0){
        currentIndex--;
        updateCharVisual();
        updatePlayerProgress();
      }
      return;
    }

    // Bỏ qua các phím điều khiển không phải ký tự in được
    if(e.key.length !== 1) return;
    e.preventDefault();

    const expectedChar = raceText[currentIndex];
    const typedChar = e.key;
    totalKeystrokes++;

    if(typedChar === expectedChar){
      // Đúng ký tự -> cho đi tiếp
      currentIndex++;
      updateCharVisual();
      updatePlayerProgress();

      if(currentIndex >= raceText.length){
        finishPlayer();
      }
    } else {
      // Sai ký tự -> khóa tại chỗ, tô đỏ ký tự hiện tại, rung nhẹ
      totalErrors++;
      const span = charSpans[currentIndex];
      span.classList.remove('current','untyped');
      span.classList.add('incorrect');
      textDisplay.classList.remove('locked-error');
      // re-trigger animation
      void textDisplay.offsetWidth;
      textDisplay.classList.add('locked-error');
    }
  }

  function updatePlayerProgress(){
    updateRacerProgress(playerRacer.fillEl, playerRacer.pctEl, currentIndex, raceText.length, currentIndex>=raceText.length);
  }

  function finishPlayer(){
    isFinished = true;
    playerFinishTime = (performance.now() - startTime) / 1000;
    checkRaceEnd(true);
  }

  let playerFinishTime = null;

  /* ============ RACE END / RESULTS ============ */
  function checkRaceEnd(playerJustFinished){
    const allBotsFinished = bots.every(b=>b.finished);
    if((isFinished || playerJustFinished) || allBotsFinished){
      // Kết thúc đua khi: player xong, HOẶC tất cả bot đã xong
      if(isFinished || allBotsFinished){
        endRace();
      }
    }
  }

  function endRace(){
    if(!isRaceActive) return; // tránh gọi nhiều lần
    isRaceActive = false;
    if(gameLoopId) cancelAnimationFrame(gameLoopId);
    if(statsIntervalId) clearInterval(statsIntervalId);
    updateStatsDisplay();

    // Tính kết quả xếp hạng
    const results = [];
    results.push({
      name:'Bạn',
      time: isFinished ? playerFinishTime : Infinity,
      isPlayer:true
    });
    bots.forEach(bot=>{
      results.push({
        name: bot.name,
        time: bot.finished ? bot.finishTime : Infinity,
        isPlayer:false
      });
    });
    results.sort((a,b)=> a.time - b.time);

    showResultModal(results);
  }

  function showResultModal(results){
    const playerRank = results.findIndex(r=>r.isPlayer) + 1;
    if(playerRank === 1){
      resultTitle.textContent = 'VỀ NHẤT! 🏁';
    } else if(isFinished){
      resultTitle.textContent = 'VỀ ĐÍCH HẠNG ' + playerRank;
    } else {
      resultTitle.textContent = 'CHƯA VỀ ĐÍCH';
    }

    leaderboardEl.innerHTML = '';
    results.forEach((r, idx)=>{
      const li = document.createElement('li');
      if(r.isPlayer) li.classList.add('you');
      const rankSpan = document.createElement('span');
      rankSpan.innerHTML = '<span class="rank">#'+(idx+1)+'</span> ' + r.name;
      const timeSpan = document.createElement('span');
      timeSpan.textContent = (r.time === Infinity) ? '— chưa xong' : r.time.toFixed(2)+'s';
      li.appendChild(rankSpan);
      li.appendChild(timeSpan);
      leaderboardEl.appendChild(li);
    });

    resultModal.classList.add('show');
  }

  /* ============ INIT / START / RESET ============ */
  function initRace(){
    const text = customText.value.trim();
    if(!text){
      customText.focus();
      customText.style.borderColor = 'var(--stop-red)';
      setTimeout(()=>{ customText.style.borderColor=''; }, 1000);
      return;
    }

    raceText = text;
    currentIndex = 0;
    totalErrors = 0;
    totalKeystrokes = 0;
    isFinished = false;
    playerFinishTime = null;
    wpmRebalanceTimer = 0;
    lastTickTime = null;

    renderText(raceText);
    buildRaceTrack();

    inputSection.style.display = 'none';
    raceTrackPanel.style.display = '';
    statsPanel.style.display = '';
    textPanel.style.display = '';
    resetBtn.style.display = '';
    resultModal.classList.remove('show');

    isRaceActive = true;
    startTime = performance.now();

    hiddenInput.value = '';
    hiddenInput.focus();

    gameLoopId = requestAnimationFrame(gameLoop);
    statsIntervalId = setInterval(updateStatsDisplay, 200);
  }

  function resetToSetup(){
    isRaceActive = false;
    isFinished = false;
    if(gameLoopId) cancelAnimationFrame(gameLoopId);
    if(statsIntervalId) clearInterval(statsIntervalId);
    resultModal.classList.remove('show');

    inputSection.style.display = '';
    raceTrackPanel.style.display = 'none';
    statsPanel.style.display = 'none';
    textPanel.style.display = 'none';
    resetBtn.style.display = 'none';
  }

  function restartSameText(){
    resultModal.classList.remove('show');
    initRace();
  }

  /* ============ EVENT LISTENERS ============ */
  startBtn.addEventListener('click', initRace);
  resetBtn.addEventListener('click', resetToSetup);
  modalRestartBtn.addEventListener('click', restartSameText);

  // Bắt sự kiện gõ qua input ẩn (hỗ trợ mobile + IME tốt hơn) song song với keydown trên document
  document.addEventListener('keydown', function(e){
    if(!isRaceActive) return;
    // Đảm bảo focus luôn ở hiddenInput khi đang đua
    if(document.activeElement !== hiddenInput && e.key.length === 1){
      hiddenInput.focus();
    }
    handleKeyDown(e);
  });

  // Click vào vùng text để focus lại input ẩn (đề phòng mất focus)
  textDisplay.addEventListener('click', function(){
    if(isRaceActive) hiddenInput.focus();
  });

})();
</script>
